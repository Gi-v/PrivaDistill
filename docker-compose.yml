version: '3.8'

services:
  privadistill:
    build:
      context: .
      dockerfile: Dockerfile
    image: privadistill:latest
    container_name: privadistill_service
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    # Tight logging constraints to prevent multi-token outputs from blooming your disk
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped